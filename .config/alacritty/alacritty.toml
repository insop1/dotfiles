[window]
padding = { x = 10, y = 10 }
title = "Terminal"

[scrolling]
history = 100000

[font]
size = 11.0

[font.normal]
family = "JetBrains Mono"
style = "Regular"

[font.bold]
family = "JetBrains Mono"
style = "Bold"

[font.italic]
family = "JetBrains Mono"
style = "Italic"

[colors.primary]
background = "#2b2f3a"
foreground = "#d6d6d0"

[colors.cursor]
text = "#2b2f3a"
cursor = "#d1a36a"

[colors.selection]
text = "#2b2f3a"
background = "#c2c0b8"
