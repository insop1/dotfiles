general {
    hide_cursor = true
    grace = 0
}

background {
    monitor =
    path = ~/wallpapers/slugcats.png
    blur_passes = 0
}

input-field {
    monitor =
    size = 300, 50
    outline_thickness = 2
    dots_size = 0.3
    dots_spacing = 0.3
    dots_center = false
    outer_color = rgb(4a4d58)
    inner_color = rgb(2b2f3a)
    font_color = rgb(c2c0b8)
    placeholder_text = <i>Password...</i>
    fail_color = rgb(c25b5b)
    fail_text = <i>$FAIL</i>
    halign = center
    valign = center   
    position = 0, -20
}

label {
    monitor =
    text = $TIME
    color = rgb(c2c0b8)
    font_size = 64
    font_family = JetBrainsMono Nerd Font
    position = 0, 80
    halign = center
    valign = center
}
