# Window
window_padding_width 10
window_title_format Terminal

# Scrolling
scrollback_lines 100000

# Font
font_family      JetBrains Mono
bold_font        JetBrains Mono Bold
italic_font      JetBrains Mono Italic
bold_italic_font JetBrains Mono Bold Italic
font_size 11.0

# Base
background #2b2f3a
foreground #c8c6be

cursor            #d9a85f
cursor_text_color #2b2f3a

selection_foreground #2b2f3a
selection_background #c2c0b8

# Normal colors (0-7)
color0  #2b2f3a
color1  #c26565
color2  #7aa89e
color3  #d9a85f
color4  #6589b2
color5  #966a92
color6  #7aa89e
color7  #c8c6be

# Bright colors (8-15)
color8  #7a7d87
color9  #db7a7a
color10 #9dc4b8
color11 #ecbf74
color12 #8eafd4
color13 #b585b0
color14 #9dc4b8
color15 #e2e0d8

# URL color
url_color #d9a85f
